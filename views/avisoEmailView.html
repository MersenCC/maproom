@extern('header')

<head>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" charset="utf-8"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            /* Fondo oscuro */
            color: #E0E0E0;
            /* Texto claro */
            text-align: center;
            /* Centrar el texto */
            padding: 90px 50px 50px 50px;
            /* Espacio alrededor */
            margin: 0;
            /* Eliminar margenes por defecto */
        }

        .container {
            background: #1E1E1E;
            /* Fondo del contenedor */
            padding: 30px;
            /* Espacio interno */
            border-radius: 10px;
            /* Bordes redondeados */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            /* Sombra más pronunciada */
            display: inline-block;
            /* Ajustar el contenedor al contenido */
            max-width: 400px;
            /* Ancho máximo para el contenedor */
        }

        h1 {
            color: var(--accent);
            /* Color verde brillante para el título */
            font-size: 2.5em;
            /* Tamaño de fuente grande */
            margin-bottom: 15px;
            /* Espacio debajo del título */
        }

        p {
            color: #e8e6e6;
            margin: 10px 0;
            /* Espaciado vertical entre párrafos */
            line-height: 1.6;
            /* Espaciado entre líneas para mejor lectura */
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #FFFFFF;
            background-color: var(--accent);
            padding: 12px 25px;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.2s;
            font-weight: bold;
        }

        a:hover {
            background-color: #a04800;
            /* Color al pasar el ratón sobre el enlace */
            transform: scale(1.05);
            /* Efecto de zoom al pasar el ratón */
        }

        .logo {
            height: 80px;
            width: 80px;
            border-radius: 50%;
            background-image: url(views/static/img/maproom/maproom_icono.svg);
            border: 2.5px outset var(--accent);
            background-position: center;
            background-repeat: no-repeat;
        }

        .cabezal {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px;
                /* Menos espacio en pantallas pequeñas */
            }

            .container {
                padding: 20px;
                /* Ajustar el padding del contenedor */
            }

            h1 {
                font-size: 2em;
                /* Ajustar tamaño del título */
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="cabezal">
            <div class="logo"></div>
        </div>

        <h1>¡ENVIO DE EMAIL EXITOSO!</h1>
        <p>El email se ha enviado correctamente.</p>
        <p>Por favor, revisa tu bandeja de entrada. Si no lo ves, verifica tu carpeta de spam.</p>
        <a href="landing">Volver a la página principal</a>
    </div>

</body>

</html>
