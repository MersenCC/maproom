  <script>
    function filtroSeleccionado(event, element) {
      // Prevenir el comportamiento por defecto del enlace
      event.preventDefault();
    
      // Obtener el valor del filtro seleccionado
      const filtro = element.getAttribute('data-filter');
      console.log('Filtro seleccionado:', filtro);
    
      // Obtener todas las filas de la tabla (excepto la fila del encabezado)
      const rows = document.querySelectorAll('.tabla table tr:not(.trPrincipal)');
    
      // Mostrar u ocultar filas basadas en el filtro
      rows.forEach(row => {
        const estado = row.getAttribute('data-status');
        if (filtro === 'all' || estado === filtro) {
          row.style.display = ''; // Mostrar fila
        } else {
          row.style.display = 'none'; // Ocultar fila
        }
      });
    }
    
    function handleCheckboxClick(checkbox) {
      // Obtener la fecha y hora actual en el formato deseado
      const fechaHoraActual = new Date().toISOString().slice(0, 19).replace('T', ' ');
  
      // Cambia el valor del checkbox clickeado
      checkbox.value = checkbox.checked ? 'ON' : 'OFF';
  
      // Crear un objeto con los datos del checkbox
      const checkboxData = {
        [checkbox.name]: {
          estado: checkbox.value,
          fechaHora: fechaHoraActual
        }
      };
  
      // Convertir el objeto a JSON
      const checkboxDataJson = JSON.stringify(checkboxData);
  
      // Enviar los datos usando fetch
      fetch('panelDispositivos', {
        method: 'POST',
        body: new URLSearchParams({ checkboxData: checkboxDataJson })
      })
        .then(response => response.text())
        .then(result => {
          console.log('Éxito:', result);
        })
        .catch(error => {
          console.error('Error:', error);
        });
  
      location.reload();
    }
  </script>
